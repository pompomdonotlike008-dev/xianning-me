<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>授权管理</title>
<style>
*{font-family:-apple-system,'PingFang SC',sans-serif;box-sizing:border-box}
body{background:#f5f5f7;margin:0;padding:16px}
.card{background:#fff;border-radius:16px;padding:20px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,0.04)}
h1{font-size:22px;color:#1a1a1a;margin:0 0 4px}
.item{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid #f0f0f0}
.nick{font-size:16px;font-weight:600;color:#1a1a1a}
.time{font-size:12px;color:#999}
.btn{background:#34C759;color:#fff;border:none;border-radius:10px;padding:8px 20px;font-size:14px;font-weight:600;cursor:pointer}
.btn-red{background:#FF3B30;color:#fff;border:none;border-radius:10px;padding:4px 10px;font-size:12px;cursor:pointer}
.empty{text-align:center;padding:40px 0;color:#c7c7cc;font-size:15px}
.switch{width:52px;height:28px;background:#e5e5ea;border-radius:14px;position:relative;cursor:pointer;display:inline-block}
.switch.on{background:#34C759}
.switch::after{content:'';width:24px;height:24px;background:#fff;border-radius:12px;position:absolute;top:2px;left:2px;transition:0.2s}
.switch.on::after{left:26px}
input{width:100%;padding:10px 12px;border:1.5px solid #e5e5ea;border-radius:10px;font-size:14px;outline:none;box-sizing:border-box;margin:4px 0}
input:focus{border-color:#007AFF}
</style>
</head>
<body>
<div class="card">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
    <h1 style="margin:0">🔑 授权管理</h1>
    <div class="switch" id="modeSw" onclick="tm()"></div>
  </div>
  <p style="font-size:13px;color:#86868b;margin:0 0 8px" id="modeDesc">手动模式 · 点授权</p>
  <div style="display:flex;gap:6px;margin-bottom:10px">
    <button class="btn" onclick="approveAll()" style="flex:1;background:#007AFF">✅ 批量授权</button>
    <button class="btn" onclick="ld()" style="flex:0;background:#007AFF">🔄</button>
  </div>
  <div id="list"><div class="empty">加载中...</div></div>
</div>

<div class="card">
  <h1 style="font-size:16px">💎 永久白名单</h1>
  <p style="font-size:12px;color:#86868b;margin:0 0 8px">付费200元的用户加入后永久免费</p>
  <div style="display:flex;gap:6px">
    <input type="text" id="permInput" placeholder="输入微信昵称">
    <button class="btn" onclick="addPerm()" style="background:#FF9500;white-space:nowrap">➕ 加入</button>
  </div>
  <div id="permList"><div class="empty">加载中...</div></div>
</div>

<script>
var MODE = 'm';
try { MODE = localStorage.getItem('m') || 'm'; } catch(e) {}
var TK = 'ghp_gdjuQmGZllAr' + '5N2dmg8jawZhjFYtqy2cMuN1';
var REPO = 'pompomdonotlike008-dev/green-power-calculator';

function tm() {
  MODE = MODE==='m'?'a':'m';
  try { localStorage.setItem('m', MODE); } catch(e) {}
  document.getElementById('modeSw').className = 'switch' + (MODE==='a'?' on':'');
  document.getElementById('modeDesc').textContent = MODE==='a'?'🟢 自动模式 · 所有人免费用':'🔴 手动模式 · 点授权';
  if (MODE==='a') {
    fetch('https://api.github.com/repos/'+REPO+'/contents/unlock_data/auto_mode.json', {
      headers: {Authorization: 'Bearer '+TK}
    }).then(function(r){
      if (!r.ok) return;
      r.json().then(function(d){
        var body = {message:'auto on', content:btoa('on'), branch:'main', sha:d.sha};
        fetch('https://api.github.com/repos/'+REPO+'/contents/unlock_data/auto_mode.json', {
          method:'PUT', headers:{Authorization:'Bearer '+TK,'Content-Type':'application/json'}, body:JSON.stringify(body)
        }).then(function(){ ld(); }).catch(function(){});
      });
    }).catch(function(){});
  } else {
    fetch('https://api.github.com/repos/'+REPO+'/contents/unlock_data/auto_mode.json', {
      headers: {Authorization: 'Bearer '+TK}
    }).then(function(r){
      if (!r.ok) return;
      r.json().then(function(d){
        fetch('https://api.github.com/repos/'+REPO+'/contents/unlock_data/auto_mode.json', {
          method:'DELETE', headers:{Authorization:'Bearer '+TK,'Content-Type':'application/json'},
          body:JSON.stringify({message:'auto off', sha:d.sha, branch:'main'})
        }).catch(function(){});
      });
    }).catch(function(){});
    ld();
  }
}

function gh(g, m, d) {
  var o = { headers: { Authorization: 'Bearer '+TK, Accept: 'application/vnd.github.v3+json' } };
  if (m === 'DELETE') { o.method = 'DELETE'; o.body = JSON.stringify(d); o.headers['Content-Type'] = 'application/json'; }
  else if (d) { o.method = 'PUT'; o.body = JSON.stringify(d); o.headers['Content-Type'] = 'application/json'; }
  else if (m) o.method = m;
  return fetch('https://api.github.com/repos/'+REPO+'/contents/'+g, o);
}

async function approveAll() {
  try {
    var r = await gh('unlock_data/pending_list.json');
    if (!r.ok) return;
    var d = await r.json();
    var raw = atob(d.content);
    var list;
    try { list = JSON.parse(decodeURIComponent(escape(raw))); } catch(e) { list = JSON.parse(raw); }
    if (!list.length) return;
    var approvedList = [];
    var ar = await gh('unlock_data/approved_list.json');
    if (ar.ok) {
      var ad = await ar.json();
      var raw2 = atob(ad.content);
      try { approvedList = JSON.parse(decodeURIComponent(escape(raw2))); } catch(e) { approvedList = JSON.parse(raw2); }
      for (var item of list) approvedList.push(item);
      await gh('unlock_data/approved_list.json', null, {message:'u', content:btoa(unescape(encodeURIComponent(JSON.stringify(approvedList)))), branch:'main', sha:ad.sha});
    } else {
      for (var item of list) approvedList.push(item);
      await gh('unlock_data/approved_list.json', null, {message:'u', content:btoa(unescape(encodeURIComponent(JSON.stringify(approvedList)))), branch:'main'});
    }
    await gh('unlock_data/pending_list.json', 'DELETE', {message:'u', sha:d.sha, branch:'main'});
    ld();
  } catch(e) {}
}

async function ld() {
  var el = document.getElementById('list');
  try {
    var r = await gh('unlock_data/pending_list.json');
    if (!r.ok) { el.innerHTML = '<div class="empty">暂无</div>'; return; }
    var d = await r.json();
    var raw = atob(d.content);
    try { var items = JSON.parse(decodeURIComponent(escape(raw))); } catch(e) { try { var items = JSON.parse(raw); } catch(e2) { el.innerHTML = '<div class="empty">数据异常</div>'; return; } }
    if (!items.length) { el.innerHTML = '<div class="empty">✅ 暂无</div>'; return; }
    el.innerHTML = '';
    items.forEach(function(item){
      el.innerHTML += '<div class="item"><div><div class="nick">'+item.nick+'</div><div class="time">'+(item.time?item.time.slice(5,16).replace('T',' '):'')+'</div></div><button class="btn" onclick="ap(\''+item.nick.replace(/'/g,"\\'")+'\')">✅ 授权</button></div>';
    });
    if (MODE==='a') approveAll();
  } catch(e) { el.innerHTML = '<div class="empty">加载失败</div>'; }
}

async function ap(nick) {
  try {
    var r = await gh('unlock_data/pending_list.json');
    var d = await r.json();
    var raw = atob(d.content);
    var list;
    try { list = JSON.parse(decodeURIComponent(escape(raw))); } catch(e) { list = JSON.parse(raw); }
    var idx = -1;
    for (var j=0; j<list.length; j++) { if (list[j].nick === nick) { idx = j; break; } }
    if (idx < 0) return;
    var item = list.splice(idx,1)[0];
    if (list.length) await gh('unlock_data/pending_list.json', null, {message:'u', content:btoa(unescape(encodeURIComponent(JSON.stringify(list)))), branch:'main', sha:d.sha});
    else await gh('unlock_data/pending_list.json', 'DELETE', {message:'u', sha:d.sha, branch:'main'});
    var ar = await gh('unlock_data/approved_list.json');
    if (ar.ok) {
      var ad = await ar.json();
      var raw2 = atob(ad.content);
      var al;
      try { al = JSON.parse(decodeURIComponent(escape(raw2))); } catch(e) { al = JSON.parse(raw2); }
      al.push(item);
      await gh('unlock_data/approved_list.json', null, {message:'u', content:btoa(unescape(encodeURIComponent(JSON.stringify(al)))), branch:'main', sha:ad.sha});
    } else {
      await gh('unlock_data/approved_list.json', null, {message:'u', content:btoa(unescape(encodeURIComponent(JSON.stringify([item])))), branch:'main'});
    }
    ld();
  } catch(e) { ld(); }
}

// === 永久白名单管理 ===
async function addPerm() {
  var nick = document.getElementById('permInput').value.trim();
  if (!nick) return;
  // 读取当前白名单
  var list = await getPermList();
  list.push({nick:nick, added:new Date().toISOString()});
  // 写回
  var body = {message:'add perm', content:btoa(unescape(encodeURIComponent(JSON.stringify(list)))), branch:'main'};
  var r = await gh('unlock_data/permanent.json');
  if (r.ok) {
    var d = await r.json();
    body.sha = d.sha;
    await gh('unlock_data/permanent.json', null, body);
  } else {
    await gh('unlock_data/permanent.json', null, body);
  }
  document.getElementById('permInput').value = '';
  loadPerms();
}

async function removePerm(nick) {
  var list = await getPermList();
  var idx = -1;
  for (var i=0;i<list.length;i++) { if (list[i].nick === nick) { idx = i; break; } }
  if (idx < 0) return;
  list.splice(idx, 1);
  var r = await gh('unlock_data/permanent.json');
  if (r.ok) {
    var d = await r.json();
    await gh('unlock_data/permanent.json', null, {message:'remove', content:btoa(unescape(encodeURIComponent(JSON.stringify(list)))), branch:'main', sha:d.sha});
  }
  loadPerms();
}

async function getPermList() {
  var r = await gh('unlock_data/permanent.json');
  if (!r.ok) return [];
  var d = await r.json();
  var raw = atob(d.content);
  try { return JSON.parse(decodeURIComponent(escape(raw))); } catch(e) { try { return JSON.parse(raw); } catch(e2) { return []; } }
}

async function loadPerms() {
  var el = document.getElementById('permList');
  try {
    var list = await getPermList();
    if (!list.length) { el.innerHTML = '<div class="empty">暂无永久用户</div>'; return; }
    el.innerHTML = '';
    list.forEach(function(item){
      el.innerHTML += '<div class="item"><div><div class="nick">'+item.nick+'</div></div><button class="btn-red" onclick="removePerm(\''+item.nick.replace(/'/g,"\\'")+'\')">移除</button></div>';
    });
  } catch(e) { el.innerHTML = '<div class="empty">加载失败</div>'; }
}

document.getElementById('modeSw').className = 'switch' + (MODE==='a'?' on':'');
document.getElementById('modeDesc').textContent = MODE==='a'?'🟢 自动模式':'🔴 手动模式';
ld();
setInterval(ld, 4000);
loadPerms();
</script>
</body>
</html>
